<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Mi Negocio</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; box-sizing: border-box; }
        .login-card h2 { color: #2ecc71; margin-bottom: 25px; font-size: 28px; margin-top: 0; }
        .form-group { text-align: left; margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #34495e; font-weight: bold; }
        .form-group input { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .form-group input:focus { border-color: #2ecc71; outline: none; }
        .btn-login { background-color: #2ecc71; color: white; border: none; padding: 14px; width: 100%; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; width: 100%; }
        .btn-login:hover { background-color: #27ae60; }
        .divider { margin: 25px 0; border-bottom: 1px solid #e0e0e0; position: relative; }
        .divider span { background: white; padding: 0 10px; position: absolute; top: -10px; left: 50%; transform: translateX(-50%); color: #7f8c8d; font-size: 14px; }
        .btn-google { background-color: white; color: #757575; border: 1px solid #cbd5e1; padding: 12px; width: 100%; border-radius: 6px; font-size: 15px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; transition: 0.3s; margin-top: 15px; box-sizing: border-box; width: 100%; }
        .btn-google:hover { background-color: #f8fafc; }
        .btn-google img { width: 20px; height: 20px; object-fit: contain; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Iniciar Sesión</h2>
        
        <!-- Formulario por Correo -->
        <form action="verificacion.html" onsubmit="localStorage.setItem('usuarioLogueado', 'true'); localStorage.setItem('nombreCliente', 'Cliente Nuevo');">
            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" placeholder="ejemplo@correo.com" required>
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" placeholder="Tu contraseña" required>
            </div>
            <button type="submit" class="btn-login">Ingresar a mi Cuenta</button>
        </form>

        <div class="divider">
            <span>O también</span>
        </div>

        <!-- BOTÓN DE GOOGLE CONECTADO DIRECTAMENTE A TU SERVIDOR EN LA NUBE -->
        <button class="btn-google" onclick="window.location.href='https://onrender.com'">
            <img src="https://gstatic.com" alt="Google Logo">
            Continuar con Google
        </button>
    </div>

</body>
</html>
