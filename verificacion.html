<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificación de Seguridad - Mi Negocio</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .verify-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 380px; text-align: center; box-sizing: border-box; }
        .verify-card h2 { color: #2c3e50; margin-bottom: 10px; margin-top: 0; }
        .verify-card p { color: #7f8c8d; font-size: 14px; margin-bottom: 25px; line-height: 1.4; }
        .code-input { width: 100%; padding: 12px; border: 2px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-size: 20px; text-align: center; letter-spacing: 5px; font-weight: bold; margin-bottom: 20px; }
        .code-input:focus { border-color: #2ecc71; outline: none; }
        .btn-verify { background-color: #2ecc71; color: white; border: none; padding: 14px; width: 100%; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; }
        .btn-verify:hover { background-color: #27ae60; }
    </style>
</head>
<body>

    <div class="verify-card">
        <h2>Confirma tu Correo</h2>
        <p>El robot automático de la tienda ha enviado un código de verificación de 6 dígitos a tu correo. Por favor, ingrésalo abajo para confirmar tu identidad y continuar con tu pedido.</p>
        
        <!-- Al darle verificar, el sistema simula el éxito y lo manda de regreso a la tienda ya desbloqueado -->
        <form action="index.html">
            <input type="text" class="code-input" placeholder="000000" maxlength="6" required>
            <button type="submit" class="btn-verify">Verificar Código</button>
        </form>
    </div>

</body>
</html>
